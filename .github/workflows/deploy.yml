name: Deploy to Railway

on:
  push:
    branches: [ main ]

jobs:
  format-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          npm ci
          python -m pip install --upgrade pip ruff
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f flask_api/requirements.txt ]; then pip install -r flask_api/requirements.txt; fi

      - name: Run Formatting
        run: npm run format

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID }} -d
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
